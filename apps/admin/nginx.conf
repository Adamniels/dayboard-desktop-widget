# Static SPA server for the admin bundle. try_files falls back to index.html so client
# side routing works on refresh. The SPA talks to the api at the baked VITE_API_URL over
# the tailnet — nginx serves files only.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
