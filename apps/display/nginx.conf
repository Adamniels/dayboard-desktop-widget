# Static SPA server for the display bundle. try_files falls back to index.html so client
# side routing works on refresh. The SPA talks to the api at the baked VITE_API_URL, so
# nginx serves files only — no api proxy, no WebSocket proxy (the /ws upgrade goes straight
# to the api over the tailnet).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
